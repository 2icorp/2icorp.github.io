---
layout: default
---

<div class="archive-container">
  <!-- 왼쪽: 포스트 목록 -->
  <div class="archive-posts">
    <h1>{{ page.title }}</h1>
    <ul>
      {% for post in page.posts %}
        <li><a href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date: "%Y-%m-%d" }}</li>
      {% endfor %}
    </ul>
  </div>


</div>
